    <body>
        <header>
            <br>
            <h1>Jogo da Memória dos</h1> 
            <h1 style="color: #bc6828bc; text-align: center; font-size: 80px;">Santos</h1>
            <br>
        </header>
        
        <div class="container-principal" style="background-color:antiquewhite;">
        <div class="grade-imagens">
        <table>
        <script>
            const santos = [
                "SaoFilipeNeri",
                "SaoJose",
                "SaoJoaoPauloII",
                "SantaCecilia",
                "NossaSenhoraDoCarmo",
                "SantaTeresinha",
                "SantaLuzia",
                "SantoAgostinho"
            ]
            const cartas = [...santos, ...santos];
            cartas.sort(() => Math.random() -0.5);
            let primeiraCarta = null;
            let segundaCarta = null;
            let bloqueado = false;

            
        
            function VirarCarta(posicao) {
            
                if(bloqueado) return
                let carta = document.getElementById(posicao);
                let santo = cartas[posicao-1]
                carta.src = "img/" + santo + ".jpg"
                if(primeiraCarta == null) {
                    primeiraCarta = posicao
                }else if(segundaCarta == null){
                    segundaCarta = posicao
                    bloqueado = true
                    setTimeout(verificarPar, 800)
                }
                }

            function verificarPar(){
                let santo1 = cartas[primeiraCarta-1];
                let santo2 = cartas[segundaCarta-1];
                if(santo1 == santo2){
                    //acertou
                    primeiraCarta = null;
                    segundaCarta = null;
                    bloqueado = false;
                }else{
                    //errou
                    document.getElementById(primeiraCarta).src = "img/VersoDaCarta3.jpg";
                    document.getElementById(segundaCarta).src = "img/VersoDaCarta3.jpg";
                    primeiraCarta = null;
                    segundaCarta = null;
                    bloqueado = false;
                }
            }
        </script>
            <tr>
                <td> <img id="1" src="img/VersoDaCarta3.jpg" alt="" onclick="VirarCarta(1)"> </td>
                <td> <img id="2" src="img/VersoDaCarta3.jpg" alt="" onclick="VirarCarta(2)"> </td>
                <td> <img id="3" src="img/VersoDaCarta3.jpg" alt="" onclick="VirarCarta(3)"> </td>
                <td> <img id="4" src="img/VersoDaCarta3.jpg" alt="" onclick="VirarCarta(4)">  </td>
            </tr>
            <tr>

                <td> <img id="14" src="img/VersoDaCarta3.jpg" alt="" onclick="VirarCarta(14)"> </td>
